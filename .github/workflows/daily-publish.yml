name: French Flow Daily

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8,18 * * *"
  workflow_dispatch:

env:
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
  BATCH: morning

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-noto
          sudo fc-cache -f

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Run teacher bot
        run: node bot/teacher.js

      - name: Save progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
        run: |
          git config user.name "French Flow Bot"
          git config user.email "bot@french-flow.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          if [ -f bot/progress.json ] && [ -s bot/progress.json ]; then
            git add bot/progress.json
            git diff --staged --quiet || git commit -m "🤖 Update progress $(date +%Y-%m-%d)"
            git push
          fi
