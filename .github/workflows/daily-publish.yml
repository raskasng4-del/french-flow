name: French Flow Daily

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8,18 * * *"
  workflow_dispatch:

env:
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
  BATCH: morning

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-noto
          sudo fc-cache -f

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Run teacher bot
        run: node bot/teacher.js

      - name: Save progress
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const filePath = 'bot/progress.json';
            if (!fs.existsSync(filePath)) {
              console.log('No progress file found');
              return;
            }
            const content = fs.readFileSync(filePath, 'utf8');
            let sha;
            try {
              const { data: file } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: filePath,
              });
              sha = file.sha;
            } catch (e) {
              console.log('File does not exist yet, creating...');
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `🤖 Update progress ${new Date().toISOString().split('T')[0]}`,
              content: Buffer.from(content).toString('base64'),
              sha: sha,
            });
            console.log('Progress saved successfully');
