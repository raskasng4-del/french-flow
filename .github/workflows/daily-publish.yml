name: French Flow Daily

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8,18 * * *"
  workflow_dispatch:

env:
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
  BATCH: morning

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-noto
          sudo fc-cache -f

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Run teacher bot
        run: node bot/teacher.js

      - name: Save progress
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Update progress $(date +%Y-%m-%d)"
          file_pattern: bot/progress.json
          commit_user_name: "French Flow Bot"
          commit_user_email: "bot@french-flow.com"
