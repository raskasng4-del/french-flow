name: French Flow Daily

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-noto espeak espeak-data
          sudo fc-cache -f

      - name: Install Python TTS
        run: pip3 install gtts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Run teacher bot
        run: node bot/teacher.js

      - name: Save progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f bot/progress.json ] && [ -s bot/progress.json ]; then
            CONTENT=$(base64 -w0 bot/progress.json)
            SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/bot/progress.json" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
            RESP=$(curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"🤖 Update progress $(date +%Y-%m-%d)\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/bot/progress.json")
            echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅' if d.get('commit') else '❌ '+d.get('message',str(d)))" 2>/dev/null
          fi
