name: French Flow Daily

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick fonts-noto espeak espeak-data
          sudo fc-cache -f

      - name: Install Python TTS
        run: pip3 install edge-tts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Run teacher bot
        run: node bot/teacher.js

      - name: Save progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Commit all content changes via GitHub API
          for f in progress.json idiomes.json culture.json words.json grammar.json verbs.json dialogues.json; do
            F="bot/$f"
            if [ -f "$F" ] && [ -s "$F" ]; then
              CONTENT=$(base64 -w0 "$F")
              SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/contents/$F" | \
                python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
              curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"message\":\"🤖 Update $f $(date +%Y-%m-%d)\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}" \
                "https://api.github.com/repos/${{ github.repository }}/contents/$F" > /dev/null
            fi
          done
